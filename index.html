<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MukoCan Chat</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #0f0620; color: #fff; }
    .wrap { max-width: 500px; margin: 0 auto; padding: 16px; }
    .card { background: #1a0b33; border: 1px solid #3d216d; border-radius: 16px; padding: 20px; margin-bottom: 16px; }
    h1 { color: #ffd54a; text-align: center; margin-bottom: 16px; font-size: 24px; }
    input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #53308b; background: #120824; color: #fff; margin-top: 10px; font-size: 16px; }
    button { width: 100%; padding: 14px; border-radius: 10px; border: none; background: #6a2cff; color: #fff; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    .chat-box { height: 400px; overflow-y: auto; background: #120824; border: 1px solid #53308b; border-radius: 10px; padding: 10px; margin: 10px 0; }
    .msg { background: #241046; border-left: 3px solid #8c52ff; border-radius: 8px; padding: 8px 12px; margin-bottom: 8px; }
    .msg .name { color: #ffd54a; font-size: 13px; font-weight: bold; }
    .msg .text { color: #fff; font-size: 15px; margin-top: 3px; }
    .msg .time { color: #aa98d9; font-size: 11px; }
    .hidden { display: none; }
    .status { color: #7dffbc; font-size: 13px; text-align: center; margin: 5px 0; }
    .error { color: #ff6b6b; font-size: 13px; text-align: center; margin: 5px 0; background: rgba(255,0,0,0.1); padding: 8px; border-radius: 8px; }
    .row { display: flex; gap: 8px; }
    .row input { flex: 1; margin-top: 0; }
    .row button { width: auto; padding: 12px 20px; margin-top: 0; }
    .leave-btn { background: #3d1a7a; margin-top: 8px; }
    .info { color: #aa98d9; font-size: 13px; text-align: center; margin-top: 8px; }
    .input-wrap { margin-top: 10px; }
  </style>
</head>
<body>
<div class="wrap">

  <div class="card" id="joinDiv">
    <h1>MukoCan Chat</h1>
    <input id="roomIn" type="text" placeholder="Oda kodu (örn: 44)" />
    <input id="nameIn" type="text" placeholder="İsmin" />
    <button onclick="gir()">Odaya Gir</button>
    <div id="joinErr" class="error hidden"></div>
    <div class="info">Aynı oda kodu = aynı sohbet</div>
  </div>

  <div class="card hidden" id="chatDiv">
    <h1 id="odaBaslik">Oda</h1>
    <div class="status" id="durumYazi">Bağlanıyor...</div>
    <div class="chat-box" id="mesajlar"></div>
    <div id="chatErr" class="error hidden"></div>
    <div class="input-wrap">
      <div class="row">
        <input id="mesajIn" type="text" placeholder="Mesaj yaz..." />
        <button onclick="gonder()" id="gonderBtn">Gönder</button>
      </div>
      <button class="leave-btn" onclick="cik()">Odadan Çık</button>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const URL_ = "https://zxlbfzfccbdciqdmqmsy.supabase.co";
const KEY_ = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp4bGJmemZjY2JkY2lxZG1xbXN5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyNTg4NDUsImV4cCI6MjA4ODgzNDg0NX0.4QmR0PGik--bMaSL7LugNAgxZsyzgFOiuXxh8B8V9FM";
const sb = window.supabase.createClient(URL_, KEY_);

let oda = "", isim = "", timer = null, sonMesajId = null;

function safe(s) { const d = document.createElement("div"); d.textContent = s; return d.innerHTML; }
function durum(msg) { document.getElementById("durumYazi").textContent = msg; }
function hata(id, msg) { const e = document.getElementById(id); e.textContent = msg; e.classList.remove("hidden"); }
function hataGizle(id) { document.getElementById(id).classList.add("hidden"); }

function mesajEkle(m) {
  const box = document.getElementById("mesajlar");
  const zaman = new Date(m.created_at).toLocaleTimeString("tr-TR", {hour:"2-digit", minute:"2-digit"});
  const div = document.createElement("div");
  div.className = "msg";
  div.dataset.id = m.id;
  div.innerHTML = '<div class="name">' + safe(m.name) + ' <span class="time">' + zaman + '</span></div><div class="text">' + safe(m.message) + '</div>';
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

async function mesajlariYukle() {
  const { data, error } = await sb.from("messages").select("*").eq("room", oda).order("created_at", {ascending: true});
  if (error) { durum("Hata: " + error.message); return; }
  const box = document.getElementById("mesajlar");
  const mevcutIdler = Array.from(box.querySelectorAll(".msg")).map(el => el.dataset.id);
  (data || []).forEach(m => {
    if (!mevcutIdler.includes(String(m.id))) mesajEkle(m);
  });
  durum("✓ Aktif — her 3sn yenileniyor");
}

async function gir() {
  const r = document.getElementById("roomIn").value.trim();
  const n = document.getElementById("nameIn").value.trim();
  if (!r || !n) { hata("joinErr", "Oda kodu ve isim zorunlu!"); return; }
  hataGizle("joinErr");
  oda = r; isim = n;
  document.getElementById("joinDiv").classList.add("hidden");
  document.getElementById("chatDiv").classList.remove("hidden");
  document.getElementById("odaBaslik").textContent = "# " + oda;
  durum("Yükleniyor...");
  await mesajlariYukle();
  timer = setInterval(mesajlariYukle, 3000);
  document.getElementById("mesajIn").focus();
}

async function gonder() {
  const text = document.getElementById("mesajIn").value.trim();
  if (!text) return;
  hataGizle("chatErr");
  document.getElementById("gonderBtn").disabled = true;
  document.getElementById("mesajIn").value = "";
  const { error } = await sb.from("messages").insert([{ room: oda, name: isim, message: text }]);
  document.getElementById("gonderBtn").disabled = false;
  if (error) { document.getElementById("mesajIn").value = text; hata("chatErr", "Gönderilemedi: " + error.message); }
  else { await mesajlariYukle(); }
  document.getElementById("mesajIn").focus();
}

function cik() {
  clearInterval(timer); timer = null;
  oda = ""; isim = "";
  document.getElementById("mesajlar").innerHTML = "";
  document.getElementById("chatDiv").classList.add("hidden");
  document.getElementById("joinDiv").classList.remove("hidden");
}

document.addEventListener("keydown", function(e) {
  if (e.key === "Enter") {
    if (!document.getElementById("chatDiv").classList.contains("hidden")) gonder();
    else gir();
  }
});
</script>
</body>
</html>
